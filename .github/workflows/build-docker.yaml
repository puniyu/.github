name: Build Package


on:
  workflow_call:
    inputs:
      dockerfile:
        description: 'Dockerfile path'
        type: string
        required: true
      image_name:
        description: 'Image name'
        type: string
        required: true

jobs:
  build_amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: "ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:amd64"
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build_arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          file: ${{ inputs.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: "ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:latest"
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    needs: [build_amd64, build_arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:latest \
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:amd64 \
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:arm64

      - run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:latest

        


