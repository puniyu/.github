name: Build Package


on:
  workflow_call:
    inputs:
      dockerfile:
        description: 'Dockerfile path'
        type: string
        required: true
      image_name:
        description: 'Image name'
        type: string
        required: true

jobs:
  build_amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: "ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:amd64"
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build_arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          file: ${{ inputs.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: "ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:latest"
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    needs: [build_amd64, build_arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:latest \
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:amd64 \
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:arm64

      - run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:latest

        


